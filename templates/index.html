<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
  <h1>🚀 Missão Artemis</h1>

<img src="{{ url_for('static', filename='img/titulo.png') }}" width="250" style="display:block; margin:10px auto;">
   
   <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0b0f1a, #1c2541);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        p {
            max-width: 700px;
            margin: 20px auto;
            font-size: 18px;
        }

        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px;
        }

        .galeria img {
            width: 250px;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .galeria img:hover {
            transform: scale(1.05);
        }

        .logo {
            width: 180px;
            margin-top: 10px;
        }
    </style>
</head>
<body>


    <!-- Texto -->
    <p>
        A missão Artemis é um programa espacial desenvolvido pela NASA com o objetivo de levar
        novamente seres humanos à Lua. O projeto busca criar uma presença sustentável no satélite
        natural da Terra e servir como preparação para futuras missões tripuladas a Marte.
    </p>

    <!-- Galeria -->
<h2>🌕 Galeria</h2>

<div class="galeria">
    <img src="{{ url_for('static', filename='img/lua.png') }}">
    <img src="{{ url_for('static', filename='img/terra.png') }}">
    <img src="{{ url_for('static', filename='img/lamçamento.png') }}">
    <img src="{{ url_for('static', filename='img/tripulçao.png') }}">
    <img src="{{ url_for('static', filename='img/logo.png') }}">
</div>

</body>
</html>
